<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Pago Seguro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-primary fs-4 m-0" href="planes.html">
                <i class="bi bi-arrow-left me-2 fs-5"></i> Volver
            </a>
            <span class="fw-bold fs-5 text-dark"><i class="bi bi-infinity text-primary"></i> SkillSwap</span>
            <span class="text-muted"><i class="bi bi-lock-fill text-success"></i> Pago Seguro</span>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row g-5">
            
            <div class="col-lg-7">
                <h3 class="fw-bold mb-4">Detalles de Facturación</h3>
                
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                    <h5 class="mb-4 fw-bold">Método de Pago</h5>
                    
                    <div class="d-flex gap-2 mb-4">
                        <div class="border rounded px-3 py-2 border-primary bg-primary bg-opacity-10"><i class="bi bi-credit-card-fill text-primary"></i> Tarjeta</div>
                        <div class="border rounded px-3 py-2 text-muted"><i class="bi bi-paypal text-dark"></i> PayPal</div>
                    </div>

                    <form>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold small">Nombre en la tarjeta</label>
                                <input type="text" class="form-control" placeholder="Ej. Carlos Gómez" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label fw-semibold small">Número de la tarjeta</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-credit-card"></i></span>
                                    <input type="text" class="form-control border-start-0" placeholder="0000 0000 0000 0000" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Fecha de Expiración</label>
                                <input type="text" class="form-control" placeholder="MM/AA" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">CVV</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" placeholder="123" required>
                                    <span class="input-group-text bg-white" data-bs-toggle="tooltip" title="3 dígitos al reverso de tu tarjeta"><i class="bi bi-question-circle text-muted"></i></span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-5">
                <h3 class="fw-bold mb-4">Resumen del Pedido</h3>
                
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <h5 class="fw-bold mb-0">Pack de 5 Créditos</h5>
                            <small class="text-muted">Microtransacción</small>
                        </div>
                        <span class="fs-5 fw-bold">$4.99</span>
                    </div>
                    
                    <hr class="text-muted opacity-50">
                    
                    <div class="d-flex justify-content-between mb-2 small text-muted">
                        <span>Subtotal</span>
                        <span>$4.99</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 small text-muted">
                        <span>Impuestos (IGV 18%)</span>
                        <span>$0.90</span>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded">
                        <span class="fw-bold">Total a Pagar</span>
                        <span class="fs-4 fw-bold text-primary">$5.89</span>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" onclick="procesarPago(this)">
                        <i class="bi bi-lock-fill me-1"></i> Pagar $5.89 de forma segura
                    </button>
                    
                    <p class="text-center text-muted small mt-3 mb-0">
                        <i class="bi bi-shield-check text-success"></i> Pago encriptado de 256-bits.
                    </p>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function procesarPago(btn) {
            // Cambia el aspecto del botón
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Procesando...';
            btn.classList.add('disabled');
            
            // Simula un tiempo de carga (2 segundos) y luego redirige
            setTimeout(() => {
                alert("¡Pago procesado con éxito! Se han añadido 5 créditos a tu cuenta.");
                window.location.href = "index.html"; // Regresa al inicio
            }, 2000);
        }
    </script>
</body>
</html>
