<main class="auth-page d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
          <div class="text-center mb-4">
            <a class="navbar-brand fw-bold text-primary fs-3 text-decoration-none" routerLink="/dashboard">
              <i class="bi bi-infinity"></i> SkillSwap
            </a>
            <h1 class="h3 fw-bold mt-4">Inicia sesion</h1>
            <p class="text-muted mb-0">Continua tus intercambios de habilidades.</p>
          </div>

          @if (errorMessage) {
            <div class="alert alert-danger">{{ errorMessage }}</div>
          }

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Correo</label>
              <input type="email" class="form-control form-control-lg" formControlName="email" autocomplete="email">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Contrasena</label>
              <input type="password" class="form-control form-control-lg" formControlName="password" autocomplete="current-password">
              <small class="text-muted">Demo: usa los valores precargados.</small>
            </div>

            <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold" type="submit" [disabled]="isSubmitting">
              @if (isSubmitting) {
                <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
              } @else {
                Ingresar
              }
            </button>
          </form>

          <p class="text-center text-muted mt-4 mb-0">
            No tienes cuenta?
            <a routerLink="/registro" class="fw-semibold text-decoration-none">Registrate</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</main>
