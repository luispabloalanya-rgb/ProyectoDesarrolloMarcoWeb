<main class="container py-5">
  <div class="row mb-4">
    <div class="col-12">
      <a class="btn btn-link text-decoration-none ps-0 fw-semibold" routerLink="/planes">
        <i class="bi bi-arrow-left me-2"></i> Volver a planes
      </a>
    </div>
  </div>

  <div class="row g-5">
    <div class="col-lg-7">
      <h3 class="fw-bold mb-4">Detalles de Facturacion</h3>

      <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
        <h5 class="mb-4 fw-bold">Metodo de Pago</h5>

        <div class="d-flex gap-2 mb-4">
          <div class="border rounded px-3 py-2 border-primary bg-primary bg-opacity-10"><i class="bi bi-credit-card-fill text-primary"></i> Tarjeta</div>
          <div class="border rounded px-3 py-2 text-muted"><i class="bi bi-paypal text-dark"></i> PayPal</div>
        </div>

        <form>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold small">Nombre en la tarjeta</label>
              <input type="text" class="form-control" placeholder="Ej. Carlos Gomez" required>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold small">Numero de la tarjeta</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-credit-card"></i></span>
                <input type="text" class="form-control border-start-0" placeholder="0000 0000 0000 0000" required>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold small">Fecha de Expiracion</label>
              <input type="text" class="form-control" placeholder="MM/AA" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold small">CVV</label>
              <div class="input-group">
                <input type="password" class="form-control" placeholder="123" required>
                <span class="input-group-text bg-white" title="3 digitos al reverso de tu tarjeta"><i class="bi bi-question-circle text-muted"></i></span>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <h3 class="fw-bold mb-4">Resumen del Pedido</h3>

      <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h5 class="fw-bold mb-0">Pack de 5 Creditos</h5>
            <small class="text-muted">Microtransaccion</small>
          </div>
          <span class="fs-5 fw-bold">$4.99</span>
        </div>

        <hr class="text-muted opacity-50">

        <div class="d-flex justify-content-between mb-2 small text-muted">
          <span>Subtotal</span>
          <span>$4.99</span>
        </div>
        <div class="d-flex justify-content-between mb-3 small text-muted">
          <span>Impuestos (IGV 18%)</span>
          <span>$0.90</span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded">
          <span class="fw-bold">Total a Pagar</span>
          <span class="fs-4 fw-bold text-primary">$5.89</span>
        </div>

        <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" type="button" [disabled]="isProcessing" (click)="processPayment()">
          @if (isProcessing) {
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Procesando...
          } @else {
            <i class="bi bi-lock-fill me-1"></i> Pagar $5.89 de forma segura
          }
        </button>

        <p class="text-center text-muted small mt-3 mb-0">
          <i class="bi bi-shield-check text-success"></i> Pago encriptado de 256-bits.
        </p>
      </div>
    </div>
  </div>
</main>
